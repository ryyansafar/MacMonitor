name: Release

# Triggers when you push a version tag — e.g.  git tag v1.2.0 && git push origin v1.2.0
on:
  push:
    tags:
      - "v[0-9]*"

jobs:
  build-and-release:
    name: Build DMG · Publish Release · Update Homebrew
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v5

      # ── 2. Xcode version ───────────────────────────────────────────────────────
      - name: Xcode version
        run: xcodebuild -version

      # ── 3. Install mactop ──────────────────────────────────────────────────────
      - name: Install mactop
        run: brew install mactop

      # ── 4. Build DMG ───────────────────────────────────────────────────────────
      - name: Build release DMG
        env:
          CI: true
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export MACMONITOR_VERSION="$VERSION"
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh

      # ── 5. Publish GitHub Release ──────────────────────────────────────────────
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/MacMonitor-*.dmg \
            --title "MacMonitor $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag

      # ── 6. Compute DMG SHA256 ─────────────────────────────────────────────────
      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 dist/MacMonitor-*.dmg | awk '{print $1}')
          VERSION="${GITHUB_REF_NAME#v}"
          echo "sha256=$SHA"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── 7. Update Homebrew tap ────────────────────────────────────────────────
      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: ryyansafar/homebrew-macmonitor
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update Cask formula
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i '' "s/  version \".*\"/  version \"${VERSION}\"/"  tap/Casks/macmonitor.rb
          sed -i '' "s/  sha256 \".*\"/  sha256 \"${SHA}\"/"        tap/Casks/macmonitor.rb

      - name: Push updated formula
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/macmonitor.rb
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump macmonitor to v${{ steps.sha.outputs.version }}"
          git push
