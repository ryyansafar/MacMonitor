name: Release

# Triggers when you push a version tag — e.g.  git tag v1.2.0 && git push origin v1.2.0
on:
  push:
    tags:
      - "v[0-9]*"

jobs:
  build-and-release:
    name: Build DMG · Publish Release · Update Homebrew
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v5

      # ── 2. Xcode version ───────────────────────────────────────────────────────
      - name: Xcode version
        run: xcodebuild -version

      # ── 3. Build DMG ───────────────────────────────────────────────────────────
      # mactop is no longer installed here — v2.0 reads sensors natively (SMC + IOReport).
      - name: Build release DMG
        env:
          CI: true
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export MACMONITOR_VERSION="$VERSION"
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh

      # ── 4. Publish GitHub Release ──────────────────────────────────────────────
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/MacMonitor-*.dmg \
            --title "MacMonitor $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag

      # ── 5. Compute DMG SHA256 ─────────────────────────────────────────────────
      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 dist/MacMonitor-*.dmg | awk '{print $1}')
          VERSION="${GITHUB_REF_NAME#v}"
          echo "sha256=$SHA"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── 6. Update in-repo Cask ────────────────────────────────────────────────
      # The README tells users to `brew tap ryyansafar/macmonitor https://github.com/ryyansafar/MacMonitor`
      # which reads Casks/macmonitor.rb from this repo. Keep its version + SHA in sync
      # with every release so `brew install --cask macmonitor` works out of the box.
      - name: Update in-repo Cask
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i '' "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/macmonitor.rb
          sed -i '' "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/"       Casks/macmonitor.rb

      - name: Commit in-repo Cask update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/macmonitor.rb
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore(cask): bump in-repo cask to v${{ steps.sha.outputs.version }}"
          # Push the cask update to main so users tapping this repo get it.
          git push origin HEAD:main

      # ── 7. Update separate Homebrew tap repo ─────────────────────────────────
      # Kept as a secondary distribution channel for users on the legacy
      # `ryyansafar/homebrew-macmonitor` tap. Skipped automatically if the
      # HOMEBREW_TAP_TOKEN secret is not set (e.g., when forking).
      - name: Check tap token
        id: tap_token
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN not set — skipping separate tap update"
          fi

      - name: Checkout Homebrew tap
        if: steps.tap_token.outputs.available == 'true'
        uses: actions/checkout@v5
        with:
          repository: ryyansafar/homebrew-macmonitor
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update tap Cask formula
        if: steps.tap_token.outputs.available == 'true'
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i '' "s/  version \".*\"/  version \"${VERSION}\"/"  tap/Casks/macmonitor.rb
          sed -i '' "s/  sha256 \".*\"/  sha256 \"${SHA}\"/"        tap/Casks/macmonitor.rb

      - name: Push updated tap formula
        if: steps.tap_token.outputs.available == 'true'
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/macmonitor.rb
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump macmonitor to v${{ steps.sha.outputs.version }}"
          git push
